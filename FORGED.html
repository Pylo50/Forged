<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>FORGED</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Crimson+Pro:wght@300;400&display=swap');
:root{--bg:#0a0a0f;--surface:#0e0e18;--border:rgba(255,255,255,0.07);--text:#e8e0d0;--muted:#666;--mind:#7EB8F7;--bodyc:#F77E7E;--soul:#C07EF7;--wealth:#F7D07E;--rel:#F7A87E;--disc:#7EF7C4;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro','Georgia',serif;min-height:100vh;overflow-x:hidden;}
.cinzel{font-family:'Cinzel','Georgia',serif;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.014) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.014) 1px,transparent 1px);background-size:56px 56px;}
#app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:22px 15px 100px;}

/* Header */
header{display:flex;align-items:center;gap:13px;padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.emblem{font-size:32px;color:var(--wealth);line-height:1;flex-shrink:0;text-shadow:0 0 18px rgba(247,208,126,0.4);}
.hero-name{font-family:'Cinzel','Georgia',serif;font-size:clamp(15px,4.5vw,23px);font-weight:800;color:#fff;letter-spacing:2px;}
.hero-class{font-family:'Cinzel','Georgia',serif;font-size:clamp(10px,3vw,13px);font-weight:400;color:var(--wealth);letter-spacing:2px;margin-top:1px;opacity:0.85;}

.hero-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:3px;}
.hero-sub b{color:var(--wealth);font-weight:600;}
.hdr-right{margin-left:auto;text-align:right;flex-shrink:0;}
.qcount{font-size:10px;color:#333;letter-spacing:1px;}
.streak-hdr{font-size:11px;color:var(--disc);letter-spacing:1px;margin-top:2px;}

/* Nav */
nav{display:flex;gap:2px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:20px;overflow-x:auto;}
.tab{flex:1;min-width:52px;padding:9px 3px;background:transparent;border:none;color:var(--muted);font-size:9px;letter-spacing:0.8px;cursor:pointer;border-radius:7px;font-family:'Cinzel','Georgia',serif;transition:all 0.18s;white-space:nowrap;}
.tab.active{background:rgba(255,255,255,0.09);color:var(--text);}

/* Domain cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;transition:border-color 0.25s;}
.card-glow{position:absolute;top:-40px;right:-40px;width:110px;height:110px;border-radius:50%;filter:blur(40px);opacity:0.17;pointer-events:none;}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.d-icon{font-size:22px;line-height:1;}
.d-label{font-family:'Cinzel','Georgia',serif;font-size:13px;font-weight:600;letter-spacing:1px;}
.d-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.4px;}
.lvl-badge{margin-left:auto;font-family:'Cinzel','Georgia',serif;font-size:10px;padding:3px 8px;border:1px solid;border-radius:4px;letter-spacing:1px;flex-shrink:0;}
.bar-bg{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:6px;}
.bar-fill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}
.xp-label{font-size:10px;color:var(--muted);text-align:right;}
.xp-total{font-size:9px;color:#2a2a2a;text-align:right;margin-top:2px;}

/* Discipline card */
.disc-card{background:var(--surface);border:1px solid rgba(126,247,196,0.2);border-radius:12px;padding:20px;position:relative;overflow:hidden;grid-column:1/-1;}
.disc-card .card-glow{background:rgba(126,247,196,0.3);}
.disc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.disc-main-icon{font-size:26px;color:var(--disc);}
.disc-title{font-family:'Cinzel','Georgia',serif;font-size:14px;font-weight:700;color:var(--disc);letter-spacing:1px;}
.disc-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.disc-big-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px;}
.disc-big{font-family:'Cinzel','Georgia',serif;font-size:50px;font-weight:800;color:var(--disc);line-height:1;text-shadow:0 0 22px rgba(126,247,196,0.4);}
.disc-unit{font-size:13px;color:var(--muted);margin-bottom:9px;}
.disc-best{font-size:11px;color:#333;margin-left:auto;align-self:flex-end;padding-bottom:3px;}
.disc-xp-note{font-size:11px;color:rgba(126,247,196,0.5);margin-bottom:12px;letter-spacing:0.5px;}
.ms-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.ms-badge{padding:4px 10px;border:1px solid;border-radius:20px;font-family:'Cinzel','Georgia',serif;font-size:9px;letter-spacing:1px;}
.ms-badge.locked{border-color:#1c1c1c;color:#2a2a2a;}
.ms-badge.reached{border-color:var(--disc);color:var(--disc);background:rgba(126,247,196,0.07);}
.disc-btns{display:flex;gap:9px;flex-wrap:wrap;}
.disc-btn{padding:8px 16px;border:1px solid;border-radius:8px;font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:1px;cursor:pointer;background:transparent;transition:all 0.15s;}
.disc-btn:active{transform:scale(0.96);}
.disc-btn.checkin{border-color:var(--disc);color:var(--disc);}
.disc-btn.checkin:disabled{border-color:#1e1e1e;color:#2e2e2e;cursor:default;}
.disc-btn.relapse{border-color:#2e1c1c;color:#553333;font-size:10px;}
.disc-btn.relapse:hover{border-color:#553333;color:#775555;}

/* Boss quests */
.boss-card{background:var(--surface);border:1px solid rgba(255,200,80,0.2);border-radius:12px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;transition:border-color 0.3s;}
.boss-card.defeated{border-color:rgba(255,200,80,0.5);background:rgba(255,200,80,0.04);}
.boss-glow{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;filter:blur(40px);opacity:0.12;pointer-events:none;background:rgba(255,200,80,0.6);}
.boss-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.boss-icon{font-size:28px;line-height:1;flex-shrink:0;}
.boss-title{font-family:'Cinzel','Georgia',serif;font-size:15px;font-weight:700;color:#F7C84A;letter-spacing:1px;}
.boss-flavor{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic;}
.boss-reward{margin-left:auto;font-family:'Cinzel','Georgia',serif;font-size:11px;color:#F7C84A;border:1px solid rgba(247,200,74,0.3);padding:4px 10px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.boss-hp-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.boss-hp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#c8900050,#F7C84A);box-shadow:0 0 8px rgba(247,200,74,0.4);transition:width 0.7s cubic-bezier(.4,0,.2,1);}
.boss-progress-label{font-size:10px;color:var(--muted);margin-bottom:14px;}
.boss-steps{display:flex;flex-direction:column;gap:7px;}
.boss-step{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;background:rgba(255,255,255,0.02);cursor:pointer;transition:all 0.2s;}
.boss-step.done{opacity:0.4;background:transparent;}
.boss-step:active{transform:scale(0.99);}
.boss-step-check{width:18px;height:18px;border:1px solid #444;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all 0.2s;}
.boss-step.done .boss-step-check{background:rgba(247,200,74,0.15);border-color:#F7C84A;color:#F7C84A;}
.boss-step-domain{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid;letter-spacing:0.8px;flex-shrink:0;}
.boss-step-text{font-size:13px;color:#ccc;flex:1;line-height:1.3;}
.boss-step-xp{font-size:11px;font-weight:600;flex-shrink:0;}
.boss-defeated-banner{text-align:center;padding:14px;border:1px solid rgba(247,200,74,0.4);border-radius:8px;background:rgba(247,200,74,0.06);}
.boss-defeated-banner .cinzel{font-size:15px;color:#F7C84A;letter-spacing:2px;}
.boss-defeated-banner p{font-size:12px;color:var(--muted);margin-top:4px;}

/* Quests */
.q-sublabel{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#333;margin:10px 0 5px 2px;}
.q-section{margin-bottom:24px;}
.q-header{font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.q-row{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:5px;gap:9px;transition:opacity 0.2s,border-color 0.2s;}
.q-row.done{opacity:0.32;}
.q-info{flex:1;min-width:0;}
.q-freq{font-size:8px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:3px;}
.q-text{font-size:13px;color:#ddd;line-height:1.3;}
.q-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.q-xp{font-size:11px;font-weight:600;white-space:nowrap;}
.q-btn{padding:5px 10px;border:1px solid;border-radius:6px;font-size:10px;font-family:'Cinzel','Georgia',serif;background:transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.q-btn:active{transform:scale(0.95);}

/* Log */
.log-title{font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.log-empty{color:#2e2e2e;font-style:italic;font-size:15px;text-align:center;margin-top:50px;line-height:1.8;}
.log-row{display:flex;align-items:center;gap:9px;padding:10px 12px;border-left:2px solid;background:var(--surface);margin-bottom:5px;border-radius:0 8px 8px 0;font-size:13px;}
.log-txt{flex:1;color:#ccc;}
.log-time{font-size:10px;color:#2e2e2e;flex-shrink:0;}

/* Overlays */
#lvlup{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.86);}
#lvlup.show{display:flex;}
#lvlup-box{background:var(--surface);border:1px solid;border-radius:16px;padding:38px 50px;text-align:center;animation:lvlpulse 0.6s ease-in-out infinite alternate;max-width:88vw;}
#lvlup-icon{font-size:44px;}
#lvlup-domain{font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-top:10px;}
#lvlup-head{font-family:'Cinzel','Georgia',serif;font-size:30px;color:#fff;margin:8px 0 5px;}
#lvlup-sub{font-size:14px;color:#aaa;}

#bosswin{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);}
#bosswin.show{display:flex;}
#bosswin-box{background:#0e0e10;border:1px solid rgba(247,200,74,0.6);border-radius:16px;padding:40px 50px;text-align:center;animation:bossshine 1s ease-in-out infinite alternate;max-width:90vw;box-shadow:0 0 60px rgba(247,200,74,0.15);}
#bosswin-icon{font-size:52px;}
#bosswin-title{font-family:'Cinzel','Georgia',serif;font-size:12px;letter-spacing:4px;color:#F7C84A;margin-top:10px;text-transform:uppercase;}
#bosswin-name{font-family:'Cinzel','Georgia',serif;font-size:26px;color:#fff;margin:8px 0 5px;}
#bosswin-xp{font-size:18px;color:#F7C84A;font-weight:600;}
#bosswin-sub{font-size:13px;color:#666;margin-top:6px;}

#xpfloat{position:fixed;top:40%;left:50%;transform:translateX(-50%);z-index:200;font-family:'Cinzel','Georgia',serif;font-size:20px;font-weight:700;pointer-events:none;display:none;text-shadow:0 0 16px currentColor;}
#xpfloat.show{display:block;animation:floatup 1.3s ease-out forwards;}

/* ── Trophy Room ── */
.trophy-domain-header{font-family:'Cinzel','Georgia',serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin:20px 0 10px;}
.trophy-card{background:var(--surface);border:1px solid;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
.trophy-icon{font-size:24px;flex-shrink:0;}
.trophy-info{flex:1;min-width:0;}
.trophy-text{font-size:14px;color:#e8e0d0;line-height:1.3;}
.trophy-meta{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:0.5px;}
.trophy-xp{font-family:'Cinzel','Georgia',serif;font-size:12px;font-weight:600;flex-shrink:0;}
.trophy-locked{background:rgba(255,255,255,0.02);border:1px dashed #1e1e1e;border-radius:10px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;gap:12px;opacity:0.5;}
.trophy-locked-icon{font-size:18px;color:#2a2a2a;flex-shrink:0;}
.trophy-locked-text{font-size:12px;color:#2a2a2a;flex:1;}
.trophy-locked-lvl{font-size:10px;color:#222;flex-shrink:0;font-family:'Cinzel','Georgia',serif;}
.trophy-empty{color:#2a2a2a;font-style:italic;font-size:14px;text-align:center;padding:30px 0;}
.trophy-count{font-family:'Cinzel','Georgia',serif;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;margin-left:auto;}
.avatar-wrap{text-align:center;padding:20px 0 10px;margin-bottom:10px;}
.avatar-art{font-size:clamp(48px,12vw,72px);line-height:1;display:block;margin:0 auto;filter:drop-shadow(0 0 16px var(--avatar-glow,#F7D07E));}
.avatar-title{font-family:'Cinzel','Georgia',serif;font-size:clamp(18px,5vw,26px);font-weight:800;color:#fff;letter-spacing:2px;margin-top:8px;}
.avatar-class{font-family:'Cinzel','Georgia',serif;font-size:clamp(11px,3vw,14px);color:var(--wealth);letter-spacing:2px;margin-top:2px;opacity:0.85;}
.avatar-lvl{font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:4px;}
.avatar-name{font-family:'Cinzel','Georgia',serif;font-size:13px;color:#555;letter-spacing:3px;margin-top:3px;cursor:pointer;transition:color 0.2s;}
.avatar-name:hover{color:#888;}

/* ── Stats ── */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #111;}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:13px;color:var(--muted);}
.stat-val{font-family:'Cinzel','Georgia',serif;font-size:13px;color:#e8e0d0;}
.week-bar-wrap{margin-top:10px;}
.week-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.week-bar-day{font-size:10px;color:var(--muted);width:28px;flex-shrink:0;}
.week-bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.week-bar-fill{height:100%;border-radius:3px;transition:width 0.5s;}
.week-bar-count{font-size:10px;color:var(--muted);width:20px;text-align:right;flex-shrink:0;}

/* ── Custom quests ── */
.cq-form{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.cq-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.cq-input{flex:1;min-width:140px;background:#0a0a0f;border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'Crimson Pro','Georgia',serif;font-size:14px;outline:none;}
.cq-input:focus{border-color:rgba(247,208,126,0.3);}
.cq-select{background:#0a0a0f;border:1px solid var(--border);border-radius:7px;padding:9px 10px;color:var(--text);font-family:'Cinzel','Georgia',serif;font-size:11px;outline:none;cursor:pointer;}
.cq-add-btn{padding:9px 16px;border:1px solid #F7D07E;border-radius:7px;background:rgba(247,208,126,0.07);color:#F7D07E;font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:1px;cursor:pointer;white-space:nowrap;}
.cq-add-btn:active{transform:scale(0.97);}
.cq-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 12px;margin-bottom:5px;}
.cq-item-text{flex:1;font-size:13px;color:#ccc;}
.cq-item-domain{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid;letter-spacing:0.8px;}
.cq-item-xp{font-size:11px;font-weight:600;}
.cq-item-del{background:transparent;border:none;color:#333;font-size:16px;cursor:pointer;padding:0 4px;transition:color 0.2s;}
.cq-item-del:hover{color:#775555;}

/* ── Notifications ── */
.notif-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.notif-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.notif-label{font-size:13px;color:var(--muted);flex:1;}
.notif-time{background:#0a0a0f;border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;}
.notif-toggle{padding:7px 14px;border:1px solid;border-radius:6px;font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:1px;cursor:pointer;background:transparent;transition:all 0.2s;}
.notif-status{font-size:11px;color:#444;margin-top:4px;letter-spacing:0.5px;}
.j-section-title{font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.j-mode-row{display:flex;gap:8px;margin-bottom:20px;}
.j-mode-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:1px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.j-mode-btn.active{background:rgba(192,126,247,0.1);border-color:#C07EF7;color:#C07EF7;}
.j-prompt-card{background:var(--surface);border:1px solid rgba(192,126,247,0.2);border-radius:12px;padding:18px;margin-bottom:16px;position:relative;overflow:hidden;}
.j-prompt-glow{position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;filter:blur(35px);opacity:0.15;background:#C07EF7;pointer-events:none;}
.j-prompt-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#C07EF755;margin-bottom:6px;}
.j-prompt-text{font-size:15px;color:#ddd;line-height:1.6;font-style:italic;}
.j-field-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:14px;}
.j-textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:'Crimson Pro','Georgia',serif;font-size:15px;line-height:1.6;resize:vertical;min-height:90px;outline:none;transition:border-color 0.2s;}
.j-textarea:focus{border-color:#C07EF755;}
.j-gratitude-row{display:flex;flex-direction:column;gap:7px;margin-bottom:4px;}
.j-gratitude-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Crimson Pro','Georgia',serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.j-gratitude-input:focus{border-color:#C07EF755;}
.j-gratitude-input::placeholder{color:#333;}
.j-slider-row{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.j-slider-label{font-size:12px;color:var(--muted);min-width:60px;}
.j-slider{flex:1;-webkit-appearance:none;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;outline:none;}
.j-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#C07EF7;cursor:pointer;box-shadow:0 0 8px rgba(192,126,247,0.5);}
.j-slider-val{font-family:'Cinzel','Georgia',serif;font-size:12px;color:#C07EF7;min-width:20px;text-align:right;}
.j-tag-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px;}
.j-tag{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-family:'Cinzel','Georgia',serif;font-size:9px;letter-spacing:1px;cursor:pointer;background:transparent;transition:all 0.2s;color:var(--muted);}
.j-tag.selected{color:#fff;}
.j-submit-btn{width:100%;padding:12px;margin-top:18px;border:1px solid #C07EF7;border-radius:8px;background:rgba(192,126,247,0.08);color:#C07EF7;font-family:'Cinzel','Georgia',serif;font-size:12px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.j-submit-btn:active{transform:scale(0.98);}
.j-submit-btn:disabled{border-color:#222;color:#333;background:transparent;cursor:default;}
.j-search-row{display:flex;gap:8px;margin-bottom:16px;}
.j-search{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Crimson Pro','Georgia',serif;font-size:14px;outline:none;}
.j-search:focus{border-color:#C07EF755;}
.j-entry-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;}
.j-entry-card:hover{border-color:#C07EF755;}
.j-entry-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.j-entry-date{font-family:'Cinzel','Georgia',serif;font-size:11px;color:var(--muted);letter-spacing:1px;}
.j-entry-mode{font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid;letter-spacing:1px;}
.j-entry-tags{display:flex;flex-wrap:wrap;gap:5px;margin-left:auto;}
.j-entry-tag{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid;letter-spacing:0.8px;}
.j-entry-mood{display:flex;gap:12px;margin-bottom:8px;}
.j-entry-mood-item{font-size:11px;color:var(--muted);}
.j-entry-mood-item b{color:#C07EF7;}
.j-entry-preview{font-size:13px;color:#888;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.j-entry-expanded{font-size:14px;color:#ccc;line-height:1.7;white-space:pre-wrap;}
.j-entry-gratitude{margin-top:10px;}
.j-entry-gratitude-item{font-size:13px;color:#888;padding:4px 0;border-bottom:1px solid #1a1a1a;}
.j-entry-gratitude-item:last-child{border-bottom:none;}
.j-streak-note{font-size:11px;color:#C07EF755;text-align:center;margin-top:4px;letter-spacing:1px;}
.j-empty{color:#333;font-style:italic;font-size:15px;text-align:center;margin-top:40px;line-height:1.8;}
.j-xp-note{font-size:11px;color:rgba(192,126,247,0.5);text-align:center;margin-top:8px;letter-spacing:0.5px;}
@keyframes floatup{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}100%{opacity:0;transform:translateX(-50%) translateY(-70px) scale(1.4);}}
@keyframes bossshine{from{box-shadow:0 0 40px rgba(247,200,74,0.15);}to{box-shadow:0 0 80px rgba(247,200,74,0.35);}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px;}
@media(max-width:480px){.grid{grid-template-columns:1fr;}#lvlup-box,#bosswin-box{padding:28px 20px;}.q-right{flex-direction:column;align-items:flex-end;gap:4px;}.disc-big{font-size:40px;}.boss-reward{display:none;}}

function getDomainClass(){
  var best=null,bestLvl=0,tied=false;
  var all=DOMAINS.map(function(d){return{id:d.id,lvl:calcLevel(S.domains[d.id].xp).level};});
  all.push({id:'disc',lvl:calcLevel(S.domains['disc'].xp).level});

function getDailySeed(){
  var d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}

function getWeeklySeed(){
  // Seed based on the Monday of the current week — changes every Monday
  var d=new Date();
  var day=d.getDay(); // 0=Sun, 1=Mon...
  var daysToMonday=day===0?6:day-1;
  var monday=new Date(d);
  monday.setDate(d.getDate()-daysToMonday);
  return monday.getFullYear()*10000+(monday.getMonth()+1)*100+monday.getDate();
}

function getWeeklyMilestones(domain, domainIndex){
  var domainLvl=calcLevel(S.domains[domain.id].xp).level;
  // Pool = unlocked milestones not yet completed
  var pool=domain.milestones.filter(function(q){
    return domainLvl>=(q.unlockAt||1) && !S.milestones[q.id];
  });
  if(!pool.length) return [];
  // Pick 2 using weekly seed — stable all week, changes Monday
  var seed=getWeeklySeed();
  var available=pool.slice();
  var picked=[];
  var count=Math.min(2,available.length);
  for(var i=0;i<count;i++){
    var r=seededRandom(seed,domainIndex*50+i+77);
    var idx=Math.floor(r*available.length);
    picked.push(available.splice(idx,1)[0]);
  }
  return picked;
}

function getNextMondayStr(){
  var d=new Date();
  var day=d.getDay();
  var daysUntilMonday=day===0?1:8-day;
  var next=new Date(d);
  next.setDate(d.getDate()+daysUntilMonday);
  return next.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
}

function seededRandom(seed,index){
  var x=Math.sin(seed*9301+index*49297+233)*93457;
  return x-Math.floor(x);
}

function pickDailyRandoms(pool,count,domainIndex){
  var seed=getDailySeed();
  var available=pool.slice();
  var picked=[];
  for(var i=0;i<Math.min(count,available.length);i++){
    var r=seededRandom(seed,domainIndex*100+i);
    var idx=Math.floor(r*available.length);
    picked.push(available.splice(idx,1)[0]);
  }
  return picked;
}

  };
}

function load(){
  try{
    var raw=localStorage.getItem('liferpg_v3');
    if(!raw) return freshState();
    var s=JSON.parse(raw);
    var todayStr=new Date().toDateString();
    if(s.lastReset!==todayStr){
      s.today={};
      s.lastReset=todayStr;
      s._newDay=true;
    }
    DOMAINS.forEach(function(d){if(!s.domains[d.id])s.domains[d.id]={xp:0};});
    if(!s.domains['disc'])s.domains['disc']={xp:0};
    if(!s.bossSteps)s.bossSteps={};
    if(!s.bossDefeated)s.bossDefeated={};
    if(!s.streak)s.streak={count:0,lastCheckin:'',best:0,awardedMs:{}};
    if(!s.streak.awardedMs)s.streak.awardedMs={};
    if(!s.journal)s.journal=[];
    return s;
  }catch(e){return freshState();}
}

function xpNeeded(l){return Math.floor(100*Math.pow(1.42,l-1));}
function calcLevel(xp){var l=1,r=xp;while(r>=xpNeeded(l)){r-=xpNeeded(l);l++;}return{level:l,cur:r,need:xpNeeded(l)};}
function getTitle(n){var t=TITLES[0][1];for(var i=0;i<TITLES.length;i++){if(n>=TITLES[i][0])t=TITLES[i][1];}return t;}
function totalLevel(){var t=0;DOMAINS.forEach(function(d){t+=calcLevel(S.domains[d.id].xp).level;});t+=calcLevel(S.domains['disc'].xp).level;return t;}

      '<div class="q-header cinzel" style="color:'+d.color+';text-shadow:0 0 8px '+d.color+'33;">'+d.icon+' '+d.label+'</div>';

    // Section label: Daily randoms
    html+='<div class="q-sublabel" style="color:#F7C84A88;">✦ Today\'s Challenges — refreshes tomorrow</div>';
    randoms.forEach(function(q){
      var done=!!S.today[q.id];

    });

    // Weekly Milestones — rotate every Monday, no repeats
    var weeklyMilestones=getWeeklyMilestones(d,di);

      return domainLvl<(q.unlockAt||1)&&!S.milestones[q.id];

      html+='<div style="font-size:12px;color:#333;font-style:italic;padding:8px 4px;">All available milestones complete. More unlock as you level up.</div>';
    } else if(!weeklyMilestones.length){

    } else {

  return html;
}

      '</div>';
      shown++;
    }
  }
  return html||'<div style="color:#2e2e2e;font-style:italic;text-align:center;padding:20px;">All milestones conquered. You are iron.</div>';
}

function awardXP(domainId, amount, label){
  var old=S.domains[domainId].xp;
  var oldLvl=calcLevel(old).level;
  S.domains[domainId].xp+=amount;
  var newLvl=calcLevel(S.domains[domainId].xp).level;

  // XP float
  var el=document.getElementById('xpfloat');
  el.textContent='+'+amount+' XP';
  var col=domainId==='disc'?'#7EF7C4':domainColor(domainId);
  el.style.color=col;
  el.className='';
  void el.offsetWidth;
  el.className='show';
  setTimeout(function(){el.className='';},1400);

  // Level up?
  if(newLvl>oldLvl){
    var box=document.getElementById('lvlup-box');
    box.style.borderColor=col;
    box.style.boxShadow='0 0 50px '+col+'44';
    document.getElementById('lvlup-icon').textContent=domainId==='disc'?'⬟':domainIcon(domainId);
    document.getElementById('lvlup-icon').style.textShadow='0 0 16px '+col;
    document.getElementById('lvlup-domain').textContent=domainLabel(domainId);
    document.getElementById('lvlup-domain').style.color=col;
    document.getElementById('lvlup-sub').innerHTML='Now level <b style="color:'+col+'">'+newLvl+'</b>';
    document.getElementById('lvlup').classList.add('show');
    setTimeout(function(){document.getElementById('lvlup').classList.remove('show');},2800);
  }

  S.log.unshift({text:label,domain:domainId,time:new Date().toLocaleTimeString()});
  if(S.log.length>50)S.log.pop();
}

function completeDaily(domainId, questId, xp, text){
  if(S.today[questId])return;
  S.today[questId]=true;
  awardXP(domainId,xp,'+'+xp+' XP — '+text);
  save(); refresh();
}

function completeMilestone(domainId, questId, xp, text){
  if(S.milestones[questId])return;
  S.milestones[questId]=true;
  awardXP(domainId,xp,'★ +'+xp+' XP — '+text);
  save(); refresh();
}

function completeBossStep(bossId, stepId, xp, domainId){
  if(S.bossSteps[stepId])return;
  S.bossSteps[stepId]=true;
  awardXP(domainId,xp,'[Boss] +'+xp+' XP — step complete');

  // Check if boss is now defeated
  var boss=BOSSES.find(function(b){return b.id===bossId;});
  var allDone=boss.steps.every(function(st){return !!S.bossSteps[st.id];});
  if(allDone&&!S.bossDefeated[bossId]){
    S.bossDefeated[bossId]=true;
    // Award bonus XP split across boss domains
    var perDomain=Math.floor(boss.bonusXp/boss.bonusDomains.length);
    boss.bonusDomains.forEach(function(did){
      S.domains[did].xp+=perDomain;
    });
    S.log.unshift({text:'☠ BOSS DEFEATED: '+boss.name+' — +'+boss.bonusXp+' bonus XP!',domain:'boss',time:new Date().toLocaleTimeString()});
    save(); refresh();
    // Show boss win overlay
    document.getElementById('bosswin-name').textContent=boss.name;
    document.getElementById('bosswin-xp').textContent='+'+boss.bonusXp+' Bonus XP';
    document.getElementById('bosswin').classList.add('show');
    setTimeout(function(){document.getElementById('bosswin').classList.remove('show');},4000);
  } else {
    save(); refresh();
  }
}

function streakCheckin(){
  var today=new Date().toDateString();
  if(S.streak.lastCheckin===today)return;

  S.streak.count++;
  if(S.streak.count>S.streak.best)S.streak.best=S.streak.count;
  S.streak.lastCheckin=today;

  // Daily XP
  var dailyXp=25;
  awardXP('disc',dailyXp,'⬟ +'+dailyXp+' XP — The Vow held (day '+S.streak.count+')');

  // Check milestone bonuses
  STREAK_MS.forEach(function(ms){
    var key='ms'+ms.days;
    if(S.streak.count>=ms.days&&!S.streak.awardedMs[key]){
      S.streak.awardedMs[key]=true;
      awardXP('disc',ms.xp,'⬟ VOW MILESTONE: '+ms.label+' — +'+ms.xp+' BONUS XP!');
    }
  });

  save(); refresh();
}

function streakRelapse(){
  if(!confirm('Reset your streak? This logs your attempt and resets to day 0.'))return;
  S.log.unshift({text:'The Vow was broken at '+S.streak.count+' days. Acknowledge it. Rise again.',domain:'disc',time:new Date().toLocaleTimeString()});
  S.streak.count=0;
  S.streak.lastCheckin='';
  // Don't reset best or awardedMs
  save(); refresh();
}

function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

  if(i>=0)jSelectedTags.splice(i,1);else jSelectedTags.push(id);
  renderJournalOnly();
}
function toggleJTagFilter(id){
  var i=jSelectedTags.indexOf(id);
  if(i>=0)jSelectedTags.splice(i,1);else jSelectedTags.push(id);
  renderJournalOnly();
}
function clearJFilter(){jSearch='';jSelectedTags=[];renderJournalOnly();}

function renderJournalOnly(){

function calcJournalStreak(){
  if(!S.journal||!S.journal.length)return 0;
  var streak=0;
  var d=new Date();
  while(true){
    var ds=d.toDateString();
    var found=S.journal.some(function(e){return e.date===ds;});
    if(!found)break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

  var energy=parseInt((document.getElementById('j-energy')||{}).value||5);

  if(!response.trim()&&!extra.trim()&&!g1.trim()){
    alert('Write something first.');return;
  }

  if(!S.journal)S.journal=[];

  var entry={
    id: Date.now().toString(),
    date: new Date().toDateString(),
    time: new Date().toLocaleTimeString(),
    mode: jMode,
    mood: mood,
    energy: energy,
    response: response.trim(),
    gratitude: [g1.trim(),g2.trim(),g3.trim()],
    extra: extra.trim(),
    tags: jSelectedTags.slice()
  };

  S.journal.unshift(entry);

  // XP reward — check if first entry today
  var todayEntries=S.journal.filter(function(e){return e.date===new Date().toDateString();});
  var xpLabel='✦ +60 XP — Journal entry ('+( jMode==='morning'?'Morning':'Evening')+')';

    days.push({label:dayLabels[d.getDay()],count:0,ds:ds});
  }
  // Use dailyXpHistory if available
  if(S.dailyHistory){
    days.forEach(function(d){d.count=S.dailyHistory[d.ds]||0;if(d.count>maxCount)maxCount=d.count;});
  }

  var html='<div class="j-section-title">◈ Stats & Weekly Summary</div>';

  // Avatar showcase
  var av=getAvatar(tl);
  html+='<div style="text-align:center;margin-bottom:18px;">'+
    '<div style="font-size:50px;filter:drop-shadow(0 0 14px '+av.glow+');">'+av.art+'</div>'+
    '<div class="cinzel" style="font-size:14px;color:#fff;margin-top:6px;letter-spacing:2px;">'+getTitle(tl)+(S.heroName?' · '+S.heroName:'')+'</div>'+
    '<div class="cinzel" style="font-size:11px;color:var(--wealth);margin-top:2px;">'+getDomainClass()+'</div>'+
  '</div>';

  // Key stats
  html+='<div class="stat-card">'+
    statRow('Total Power Level', tl)+
    statRow('Total XP Earned', totalXp.toLocaleString())+
    statRow('Deeds Recorded', S.log.length)+
    statRow('Milestones Achieved', milestonesCount)+
    statRow('Bosses Defeated', bossesDefeated+' / '+BOSSES.length)+
    statRow('Vow Streak', S.streak.count+' days (best: '+S.streak.best+')')+
    statRow('Journal Streak', jStreak+' days')+
    statRow('Journal Entries', (S.journal||[]).length)+
  '</div>';

  // Domain breakdown
  html+='<div class="stat-card"><div class="cinzel" style="font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;">DOMAIN LEVELS</div>';
  DOMAINS.forEach(function(d){
    var stat=calcLevel(S.domains[d.id].xp);
    html+=statRow(d.icon+' '+d.label,'LVL '+stat.level+' · '+S.domains[d.id].xp.toLocaleString()+' XP');
  });
  var dstat=calcLevel(S.domains['disc'].xp);
  html+=statRow('⬟ The Vow','LVL '+dstat.level+' · '+S.domains['disc'].xp.toLocaleString()+' XP');
  html+='</div>';

  // Notifications section
  html+=renderNotifSection();

  // Export / Import
  html+='<div class="stat-card" style="margin-top:10px;">'+
    '<div class="cinzel" style="font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;">SAVE BACKUP</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;">'+
      '<button onclick="exportSave()" style="flex:1;padding:9px;border:1px solid #F7D07E44;border-radius:7px;background:transparent;color:#F7D07E88;font-family:Cinzel,Georgia,serif;font-size:10px;letter-spacing:1px;cursor:pointer;">⬇ Export Save</button>'+
      '<button onclick="document.getElementById(\'import-file\').click()" style="flex:1;padding:9px;border:1px solid #55555544;border-radius:7px;background:transparent;color:#555;font-family:Cinzel,Georgia,serif;font-size:10px;letter-spacing:1px;cursor:pointer;">⬆ Import Save</button>'+
    '</div>'+
    '<input type="file" id="import-file" accept=".json" style="display:none;" onchange="importSave(event)"/>'+
  '</div>';

  return html;
}

function statRow(label,val){
  return '<div class="stat-row"><div class="stat-label">'+label+'</div><div class="stat-val">'+val+'</div></div>';
}

// ═══════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════
function exportSave(){
  var data=JSON.stringify(S,null,2);
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='liferpg-save-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importSave(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var imported=JSON.parse(ev.target.result);
      if(!imported.domains)throw new Error('Invalid save');
      if(!confirm('Replace your current progress with this save?'))return;
      S=imported;
      save();refresh();
      alert('Save imported successfully!');
    }catch(err){alert('Invalid save file.');}
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════
function renderNotifSection(){
  var enabled=S.notif&&S.notif.enabled;
  var morningTime=(S.notif&&S.notif.morning)||'08:00';
  var eveningTime=(S.notif&&S.notif.evening)||'21:00';
  var supported='Notification' in window;

  return '<div class="notif-card">'+
    '<div class="cinzel" style="font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;">DAILY REMINDERS</div>'+
    (supported?
      '<div class="notif-row">'+
        '<div class="notif-label">☀ Morning reminder</div>'+
        '<input type="time" class="notif-time" id="notif-morning" value="'+morningTime+'" onchange="saveNotifTimes()"/>'+
      '</div>'+
      '<div class="notif-row">'+
        '<div class="notif-label">◑ Evening reminder</div>'+
        '<input type="time" class="notif-time" id="notif-evening" value="'+eveningTime+'" onchange="saveNotifTimes()"/>'+
      '</div>'+
      '<button class="notif-toggle" onclick="toggleNotifications()" style="border-color:'+(enabled?'#7EF7C4':'#333')+';color:'+(enabled?'#7EF7C4':'#555')+';">'+
        (enabled?'✓ Reminders On':'Enable Reminders')+
      '</button>'+
      '<div class="notif-status" id="notif-status">'+(enabled?'Reminders active — you\'ll be notified daily.':'Enable to receive daily quest reminders.')+' </div>'
    :'<div class="notif-status">Notifications not supported in this browser. Use Chrome on Android for reminders.</div>')+
  '</div>';
}

function saveNotifTimes(){
  if(!S.notif)S.notif={enabled:false,morning:'08:00',evening:'21:00'};
  var m=document.getElementById('notif-morning');
  var ev=document.getElementById('notif-evening');
  if(m)S.notif.morning=m.value;
  if(ev)S.notif.evening=ev.value;
  save();
}

function toggleNotifications(){
  if(!('Notification' in window))return;
  if(Notification.permission==='denied'){
    alert('Notifications are blocked. Please enable them in your browser settings for this site.');return;
  }
  Notification.requestPermission().then(function(perm){
    if(perm==='granted'){
      if(!S.notif)S.notif={enabled:false,morning:'08:00',evening:'21:00'};
      S.notif.enabled=!S.notif.enabled;
      save();refresh();
      if(S.notif.enabled){
        new Notification('⚜ FORGED',{body:'Reminders enabled. Complete your quests daily.',icon:''});
        scheduleNotifications();
      }
    } else {
      alert('Permission denied. You can enable notifications in your browser settings.');
    }
  });
}

function scheduleNotifications(){
  if(!S.notif||!S.notif.enabled)return;
  ['morning','evening'].forEach(function(t){
    var time=S.notif[t]||'08:00';
    var parts=time.split(':');
    var now=new Date();
    var target=new Date(now.getFullYear(),now.getMonth(),now.getDate(),parseInt(parts[0]),parseInt(parts[1]),0);
    if(target<=now)target.setDate(target.getDate()+1);
    var ms=target-now;
    setTimeout(function(){
      if(S.notif&&S.notif.enabled&&Notification.permission==='granted'){
        var msg=t==='morning'?'Your daily quests await. Begin the grind.':'Time to reflect. Complete your evening journal.';
        new Notification('⚜ FORGED — '+getTitle(totalLevel()),{body:msg});
      }
      scheduleNotifications();
    },ms);
  });
}

// ═══════════════════════════════════════════
//  CUSTOM QUESTS
// ═══════════════════════════════════════════
function renderCustomQuests(){
  if(!S.customQuests)S.customQuests=[];
  var domainOptions=DOMAINS.map(function(d){
    return '<option value="'+d.id+'">'+d.label+'</option>';
  }).join('');

  var html='<div class="j-section-title" style="margin-bottom:12px;">⬡ Your Custom Quests</div>'+
    '<div class="cq-form">'+
      '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:0.5px;">Add a quest that means something to you personally.</div>'+
      '<div class="cq-row">'+
        '<input class="cq-input" id="cq-text" placeholder="Quest description..." maxlength="80"/>'+
      '</div>'+
      '<div class="cq-row">'+
        '<select class="cq-select" id="cq-domain">'+domainOptions+'</select>'+
        '<select class="cq-select" id="cq-freq">'+
          '<option value="daily">Daily</option>'+
          '<option value="milestone">Milestone</option>'+
        '</select>'+
        '<input class="cq-input" id="cq-xp" type="number" min="10" max="500" value="40" placeholder="XP" style="max-width:70px;"/>'+
        '<button class="cq-add-btn" onclick="addCustomQuest()">+ Add</button>'+
      '</div>'+
    '</div>';

  if(!S.customQuests.length){
    html+='<div style="color:#2a2a2a;font-style:italic;font-size:14px;text-align:center;padding:20px;">No custom quests yet. Add one above.</div>';
  } else {
    S.customQuests.forEach(function(q){
      var d=DOMAINS.find(function(x){return x.id===q.domain;})||{color:'#aaa',label:q.domain,icon:'·'};
      var done=q.freq==='daily'?!!S.today['cq_'+q.id]:!!S.milestones['cq_'+q.id];
      html+='<div class="cq-item" style="opacity:'+(done?0.4:1)+';border-color:'+(done?'#1a1a1a':d.color+'22')+';">'+
        '<div class="cq-item-text">'+q.text+'</div>'+
        '<div class="cq-item-domain" style="border-color:'+d.color+'44;color:'+d.color+';">'+d.label+'</div>'+
        '<div class="cq-item-xp" style="color:'+d.color+';">+'+q.xp+'</div>'+
        '<button class="q-btn" onclick="completeCustomQuest(\''+q.id+'\')" '+
          'style="border-color:'+(done?'#222':d.color)+';color:'+(done?'#333':d.color)+';font-size:10px;padding:4px 8px;" '+
          (done?'disabled':'')+'>'+( done?'✓':'Do it')+
        '</button>'+
        '<button class="cq-item-del" onclick="deleteCustomQuest(\''+q.id+'\')">×</button>'+
      '</div>';
    });
  }
  return html;
}

function addCustomQuest(){
  var text=(document.getElementById('cq-text')||{}).value||'';
  var domain=(document.getElementById('cq-domain')||{}).value||'mind';
  var freq=(document.getElementById('cq-freq')||{}).value||'daily';
  var xp=parseInt((document.getElementById('cq-xp')||{}).value||40);
  if(!text.trim()){alert('Enter a quest description.');return;}
  if(!S.customQuests)S.customQuests=[];
  S.customQuests.push({id:Date.now().toString(),text:text.trim(),domain:domain,freq:freq,xp:Math.min(500,Math.max(10,xp||40))});
  save();refresh();showTab('quests');
}

function completeCustomQuest(id){
  if(!S.customQuests)return;
  var q=S.customQuests.find(function(x){return x.id===id;});
  if(!q)return;
  var key='cq_'+q.id;
  var done=q.freq==='daily'?!!S.today[key]:!!S.milestones[key];
  if(done)return;
  if(q.freq==='daily')S.today[key]=true;
  else S.milestones[key]=true;
  awardXP(q.domain,q.xp,'⬡ +'+q.xp+' XP — '+q.text+' (custom)');
  save();refresh();
}

function deleteCustomQuest(id){
  if(!confirm('Remove this custom quest?'))return;
  S.customQuests=S.customQuests.filter(function(q){return q.id!==id;});
  save();refresh();
}

// ═══════════════════════════════════════════
//  TROPHY ROOM
// ═══════════════════════════════════════════
function renderTrophies(){
  var totalTrophies=0,totalPossible=0;
  DOMAINS.forEach(function(d){totalPossible+=d.milestones.length;});
  totalPossible+=BOSSES.length+STREAK_MS.length;

  var html='';

  DOMAINS.forEach(function(d){
    var earned=d.milestones.filter(function(q){return !!S.milestones[q.id];});
    var domainLvl=calcLevel(S.domains[d.id].xp).level;
    totalTrophies+=earned.length;

    html+='<div class="trophy-domain-header" style="color:'+d.color+';">'+
      d.icon+' '+d.label+
      '<div class="trophy-count" style="border-color:'+d.color+'44;color:'+d.color+';">'+earned.length+' / '+d.milestones.length+'</div>'+
    '</div>';

    if(!earned.length){
      html+='<div class="trophy-empty">No '+d.label+' trophies yet.</div>';
    } else {
      earned.forEach(function(q){
        var dateEarned=(S.milestonesDates&&S.milestonesDates[q.id])||'';
        html+='<div class="trophy-card" style="border-color:'+d.color+'33;">'+
          '<div style="position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;background:'+d.glow+';filter:blur(25px);opacity:0.3;pointer-events:none;"></div>'+
          '<div class="trophy-icon" style="color:'+d.color+';">★</div>'+
          '<div class="trophy-info">'+
            '<div class="trophy-text">'+q.text+'</div>'+
            (dateEarned?'<div class="trophy-meta">Earned '+dateEarned+'</div>':'')+
          '</div>'+
          '<div class="trophy-xp" style="color:'+d.color+';">+'+q.xp+'</div>'+
        '</div>';
      });
    }
    // Peek at next locked milestone
    var nextLocked=d.milestones.find(function(q){return !S.milestones[q.id];});
    if(nextLocked){
      var lvlNeeded=nextLocked.unlockAt||1;
      html+='<div class="trophy-locked">'+
        '<div class="trophy-locked-icon">🔒</div>'+
        '<div class="trophy-locked-text">'+nextLocked.text+'</div>'+
        '<div class="trophy-locked-lvl">'+(domainLvl>=lvlNeeded?'Available now':'LVL '+lvlNeeded)+'</div>'+
      '</div>';
    }
  });

  // Boss trophies
  var bossEarned=BOSSES.filter(function(b){return !!S.bossDefeated[b.id];});
  totalTrophies+=bossEarned.length;
  html+='<div class="trophy-domain-header" style="color:#F7C84A;">☠ Bosses Defeated'+
    '<div class="trophy-count" style="border-color:#F7C84A44;color:#F7C84A;">'+bossEarned.length+' / '+BOSSES.length+'</div></div>';
  if(!bossEarned.length){
    html+='<div class="trophy-empty">No bosses defeated yet.</div>';
  } else {
    bossEarned.forEach(function(b){
      html+='<div class="trophy-card" style="border-color:#F7C84A33;">'+
        '<div class="trophy-icon">'+b.icon+'</div>'+
        '<div class="trophy-info"><div class="trophy-text">'+b.name+'</div><div class="trophy-meta" style="font-style:italic;">'+b.flavor+'</div></div>'+
        '<div class="trophy-xp" style="color:#F7C84A;">+'+b.bonusXp+'</div>'+
      '</div>';
    });
  }

  // Vow milestones
  var vowEarned=STREAK_MS.filter(function(ms){return !!S.streak.awardedMs['ms'+ms.days];});
  totalTrophies+=vowEarned.length;
  html+='<div class="trophy-domain-header" style="color:#7EF7C4;">⬟ The Vow'+
    '<div class="trophy-count" style="border-color:#7EF7C444;color:#7EF7C4;">'+vowEarned.length+' / '+STREAK_MS.length+'</div></div>';
  if(!vowEarned.length){
    html+='<div class="trophy-empty">Keep The Vow daily to earn these.</div>';
  } else {
    vowEarned.forEach(function(ms){
      html+='<div class="trophy-card" style="border-color:#7EF7C433;">'+
        '<div class="trophy-icon" style="color:#7EF7C4;">⬟</div>'+
        '<div class="trophy-info"><div class="trophy-text">'+ms.label+' holding The Vow</div></div>'+
        '<div class="trophy-xp" style="color:#7EF7C4;">+'+ms.xp+'</div>'+
      '</div>';
    });
  }

  var pct=totalPossible>0?Math.round(totalTrophies/totalPossible*100):0;
  var header='<div style="background:var(--surface);border:1px solid rgba(247,208,126,0.18);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;align-items:center;gap:16px;">'+
    '<div style="font-size:34px;">🏆</div>'+
    '<div><div class="cinzel" style="font-size:15px;color:#F7D07E;letter-spacing:1px;">Trophy Room</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-top:3px;">'+totalTrophies+' of '+totalPossible+' earned</div></div>'+
    '<div style="margin-left:auto;font-family:Cinzel,Georgia,serif;font-size:22px;color:#F7D07E;">'+pct+'%</div>'+
  '</div>';

  return header+html;
}

// Track milestone earn dates
var _origCompleteMilestone=completeMilestone;
completeMilestone=function(domainId,questId,xp,text){
  if(!S.milestonesDates)S.milestonesDates={};
  if(!S.milestones[questId])S.milestonesDates[questId]=new Date().toDateString();
  _origCompleteMilestone(domainId,questId,xp,text);
};

var _origFreshState=freshState;
freshState=function(){
  var s=_origFreshState();
  s.journal=[];
  s.customQuests=[];
  s.notif={enabled:false,morning:'08:00',evening:'21:00'};
  s.heroName='';
  s.milestonesDates={};
  return s;
};

// Ensure new fields exist on old saves
if(!S.customQuests)S.customQuests=[];
if(!S.notif)S.notif={enabled:false,morning:'08:00',evening:'21:00'};
if(S.heroName===undefined)S.heroName='';
if(!S.milestonesDates)S.milestonesDates={};

// Boot
refresh();
scheduleMidnightReset();
if(S.notif&&S.notif.enabled)scheduleNotifications();
if(S._newDay){delete S._newDay;showNewDayBanner();}
if(!S.heroName){setTimeout(function(){openNameModal();},700);}
</script>
